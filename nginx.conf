server {
    # Port non privilégié (> 1024) : compatible conteneur non-root et Cloud Run ($PORT=8080).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Durcissement HTTP (ANSSI / bonnes pratiques sécurité)
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA React : toutes les routes retombent sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
